
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.scene {
  background: #1a1b26;
  border-radius: 14px;
  padding: 20px;
  display: flex;
  justify-content: flex-end;
  align-items: flex-start;
  font-family: var(--font-sans);
}
.panel {
  width: 300px;
  background: #0d0e17;
  border: 0.5px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  overflow: hidden;
}
.panel-header {
  padding: 14px 14px 12px;
  border-bottom: 0.5px solid rgba(255,255,255,0.07);
}
.user-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: #1e2030;
  border: 0.5px solid rgba(122,162,247,0.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; color: #7aa2f7; font-weight: 500;
}
.user-name { font-size: 13px; color: #c0caf5; font-weight: 500; }
.user-host { font-size: 10px; color: #565f89; }
.lock-btn {
  margin-left: auto;
  display: flex; align-items: center; gap: 5px;
  background: rgba(255,255,255,0.05);
  border: 0.5px solid rgba(255,255,255,0.09);
  border-radius: 7px;
  padding: 5px 9px;
  cursor: pointer;
}
.lock-btn svg { width: 12px; height: 12px; stroke: #565f89; fill: none; stroke-width: 1.5; }
.lock-btn span { font-size: 11px; color: #565f89; }

.panel-section { padding: 12px 14px; border-top: 0.5px solid rgba(255,255,255,0.07); }
.sec-label { font-size: 10px; color: #565f89; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 9px; }

.toggle-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 7px;
}
.toggle-tile {
  background: rgba(255,255,255,0.04);
  border: 0.5px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  padding: 10px 10px 8px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.toggle-tile.on       { background: rgba(122,162,247,0.14); border-color: rgba(122,162,247,0.3); }
.toggle-tile.on.green { background: rgba(158,206,106,0.13); border-color: rgba(158,206,106,0.28); }
.toggle-tile.on.amber { background: rgba(224,175,104,0.13); border-color: rgba(224,175,104,0.28); }

.t-icon svg { width: 18px; height: 18px; stroke-width: 1.5; fill: none; stroke: #565f89; }
.toggle-tile.on       .t-icon svg { stroke: #7aa2f7; }
.toggle-tile.on.green .t-icon svg { stroke: #9ece6a; }
.toggle-tile.on.amber .t-icon svg { stroke: #e0af68; }

.t-label { font-size: 11px; color: #565f89; font-weight: 500; }
.toggle-tile.on       .t-label { color: #c0caf5; }
.toggle-tile.on.green .t-label { color: #c0caf5; }
.toggle-tile.on.amber .t-label { color: #c0caf5; }
.t-sub { font-size: 10px; color: #3b3f5c; }
.toggle-tile.on       .t-sub { color: rgba(122,162,247,0.6); }
.toggle-tile.on.green .t-sub { color: rgba(158,206,106,0.6); }
.toggle-tile.on.amber .t-sub { color: rgba(224,175,104,0.6); }

.slider-row { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
.slider-row:last-child { margin-bottom: 0; }
.slider-row svg { width: 14px; height: 14px; stroke: #565f89; fill: none; stroke-width: 1.5; flex-shrink: 0; }
.slider-track { flex: 1; height: 4px; background: rgba(255,255,255,0.09); border-radius: 2px; position: relative; }
.slider-fill { height: 100%; border-radius: 2px; background: #7aa2f7; }
.slider-fill.green { background: #9ece6a; }
.slider-thumb { width: 11px; height: 11px; border-radius: 50%; background: #c0caf5; border: 2px solid #0d0e17; position: absolute; top: 50%; transform: translate(-50%, -50%); }
.slider-val { font-size: 11px; color: #565f89; min-width: 28px; text-align: right; }

.panel-footer {
  border-top: 0.5px solid rgba(255,255,255,0.07);
  padding: 10px 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.footer-btn {
  display: flex; align-items: center; gap: 5px;
  background: rgba(255,255,255,0.04);
  border: 0.5px solid rgba(255,255,255,0.08);
  border-radius: 7px;
  padding: 6px 10px;
  cursor: pointer;
}
.footer-btn svg { width: 12px; height: 12px; stroke: #565f89; fill: none; stroke-width: 1.5; }
.footer-btn span { font-size: 11px; color: #565f89; }
.footer-btn.danger { border-color: rgba(247,118,142,0.25); }
.footer-btn.danger svg { stroke: #f7768e; }
.footer-btn.danger span { color: #f7768e; }
</style>

<div class="scene">
