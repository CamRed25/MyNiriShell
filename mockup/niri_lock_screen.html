
<style>
*{box-sizing:border-box;margin:0;padding:0;}
.scene{background:#1a1b26;border-radius:14px;padding:20px;font-family:var(--font-sans);display:flex;gap:16px;flex-wrap:wrap;}
.col{display:flex;flex-direction:column;gap:8px;}
.col-label{font-size:10px;color:#3b3f5c;text-transform:uppercase;letter-spacing:0.07em;}

.screen{width:320px;height:200px;border-radius:10px;overflow:hidden;position:relative;border:0.5px solid rgba(255,255,255,0.08);}
.wallpaper{position:absolute;inset:0;background:#16213e;}
.wallpaper-detail{position:absolute;inset:0;background:radial-gradient(ellipse at 30% 60%, #0f3460 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, #1a1b4b 0%, transparent 50%);}
.blur-overlay{position:absolute;inset:0;background:rgba(10,10,20,0.55);}

.idle-content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;}
.idle-time{font-size:42px;color:#c0caf5;font-weight:500;letter-spacing:-1px;line-height:1;}
.idle-date{font-size:12px;color:#565f89;}

.auth-content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
.auth-top{display:flex;flex-direction:column;align-items:center;gap:6px;}
.auth-time-small{font-size:18px;color:#c0caf5;font-weight:500;letter-spacing:-0.5px;line-height:1;}
.auth-date-small{font-size:10px;color:#565f89;}
.auth-avatar{width:44px;height:44px;border-radius:50%;background:#1e2030;border:0.5px solid rgba(122,162,247,0.3);display:flex;align-items:center;justify-content:center;font-size:15px;color:#7aa2f7;font-weight:500;}
.auth-name{font-size:12px;color:#c0caf5;font-weight:500;}
.auth-host{font-size:10px;color:#565f89;}

.pw-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;width:180px;}
.pw-field{width:100%;background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.12);border-radius:8px;padding:7px 11px;display:flex;align-items:center;gap:7px;}
.pw-field svg{width:12px;height:12px;stroke:#565f89;fill:none;stroke-width:1.5;flex-shrink:0;}
.pw-field.error{border-color:rgba(247,118,142,0.4);}
.pw-field.error svg{stroke:#f7768e;}
.pw-dots{display:flex;gap:4px;align-items:center;flex:1;}
.pw-dot{width:5px;height:5px;border-radius:50%;background:#c0caf5;}
.pw-cursor{width:1.5px;height:12px;background:#7aa2f7;border-radius:1px;}
.pw-cursor.red{background:#f7768e;}
.pw-hint{font-size:10px;color:#565f89;}
.pw-hint.error{color:#f7768e;}

.unlock-btn{width:100%;background:rgba(122,162,247,0.15);border:0.5px solid rgba(122,162,247,0.3);border-radius:8px;padding:6px;font-size:11px;color:#7aa2f7;text-align:center;cursor:pointer;font-weight:500;}

.auth-spinner{display:flex;flex-direction:column;align-items:center;gap:8px;}
.spinner{width:18px;height:18px;border:2px solid rgba(122,162,247,0.2);border-top-color:#7aa2f7;border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.spinner-text{font-size:11px;color:#565f89;}
</style>

<div class="scene">

  <div class="col">
    <div class="col-label">idle</div>
    <div class="screen">
      <div class="wallpaper"><div class="wallpaper-detail"></div></div>
      <div class="blur-overlay"></div>
      <div class="idle-content">
        <div class="idle-time">14:32</div>
        <div class="idle-date">Tuesday, April 7</div>
      </div>
    </div>
  </div>

  <div class="col">
    <div class="col-label">authenticating</div>
    <div class="screen">
      <div class="wallpaper"><div class="wallpaper-detail"></div></div>
      <div class="blur-overlay"></div>
      <div class="auth-content">
        <div class="auth-top">
          <div class="auth-time-small">14:32</div>
          <div class="auth-date-small">Tuesday, April 7</div>
        </div>
        <div class="auth-avatar">ax</div>
        <div style="text-align:center;">
          <div class="auth-name">axiom</div>
          <div class="auth-host">arch · niri</div>
        </div>
        <div class="pw-wrap">
          <div class="pw-field">
            <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <div class="pw-dots">
              <div class="pw-dot"></div>
              <div class="pw-dot"></div>
              <div class="pw-dot"></div>
              <div class="pw-dot"></div>
              <div class="pw-dot"></div>
              <div class="pw-cursor"></div>
            </div>
          </div>
          <div class="pw-hint">enter password to unlock</div>
        </div>
      </div>
    </div>
  </div>

  <div class="col">
    <div class="col-label">verifying</div>
    <div class="screen">
      <div class="wallpaper"><div class="wallpaper-detail"></div></div>
      <div class="blur-overlay"></div>
      <div class="auth-content">
        <div class="auth-top">
          <div class="auth-time-small">14:32</div>
          <div class="auth-date-small">Tuesday, April 7</div>
        </div>
        <div class="auth-avatar">ax</div>
        <div style="text-align:center;">
          <div class="auth-name">axiom</div>
          <div class="auth-host">arch · niri</div>
        </div>
        <div class="auth-spinner">
          <div class="spinner"></div>
          <div class="spinner-text">verifying…</div>
        </div>
      </div>
    </div>
  </div>

  <div class="col">
    <div class="col-label">wrong password</div>
    <div class="screen">
      <div class="wallpaper"><div class="wallpaper-detail"></div></div>
      <div class="blur-overlay"></div>
      <div class="auth-content">
        <div class="auth-top">
          <div class="auth-time-small">14:32</div>
          <div class="auth-date-small">Tuesday, April 7</div>
        </div>
        <div class="auth-avatar" style="border-color:rgba(247,118,142,0.35);">ax</div>
        <div style="text-align:center;">
          <div class="auth-name">axiom</div>
          <div class="auth-host">arch · niri</div>
        </div>
        <div class="pw-wrap">
          <div class="pw-field error">
            <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <div class="pw-dots">
              <div class="pw-cursor red"></div>
            </div>
          </div>
          <div class="pw-hint error">incorrect password — try again</div>
        </div>
      </div>
    </div>
  </div>

</div>
